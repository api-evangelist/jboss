aid: jboss
name: JBoss
description: >-
  JBoss is a division of Red Hat providing open source middleware and
  application server technologies. JBoss products include JBoss EAP (Enterprise
  Application Platform), WildFly application server, JBoss Data Grid, Keycloak
  identity management, and JBoss Fuse integration platform.
