aid: jboss
name: JBoss
description: >-
  JBoss is a division of Red Hat providing open source middleware and
  application server technologies for enterprise Java workloads. The JBoss
  product portfolio includes JBoss EAP (Enterprise Application Platform), the
  WildFly community application server, JBoss Data Grid (Red Hat Data Grid),
  Keycloak identity and access management, and JBoss Fuse integration platform
  built on Apache Camel. These projects power Jakarta EE deployments, single
  sign-on, distributed caching, and microservices integration in enterprise
  environments.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Application Server
  - Cloud Native
  - Enterprise
  - Jakarta EE
  - Java EE
  - Microservices
  - Middleware
  - Open Source
  - Red Hat
url: >-
